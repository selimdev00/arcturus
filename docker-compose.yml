services:
  app:
    build: .
    image: arcturus
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3800:80"
    volumes:
      - db:/app/database
      - storage:/app/storage
    mem_limit: 320m
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: arcturus
    restart: unless-stopped
    env_file: .env
    depends_on:
      - app
    volumes:
      - db:/app/database
      - storage:/app/storage
    # Runs the paginated HTTP parse off the request; light footprint.
    mem_limit: 256m
    entrypoint: ["sh", "-c"]
    command: ["php artisan queue:work --sleep=3 --tries=2 --timeout=240"]

volumes:
  db:
  storage:
